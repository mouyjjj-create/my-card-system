<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>客户次卡管理系统</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --primary: #4F6EF7;
            --primary-dark: #3A54D4;
            --primary-light: #EEF1FE;
            --success: #34C759;
            --warning: #FF9500;
            --danger: #FF3B30;
            --bg: #F2F3F7;
            --card-bg: #FFFFFF;
            --text: #1C1C1E;
            --text-secondary: #6B7280;
            --text-light: #9CA3AF;
            --border: #E5E7EB;
            --border-light: #F3F4F6;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.14);
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #E8ECF1; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding:0;
            -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
        }
        .app-container {
            width: 100%; max-width: 500px; min-height: 100vh; background: var(--bg); position: relative;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 20px 60px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; overflow: hidden;
        }
        @media (min-width: 501px) {
            body { padding:20px; align-items: flex-start; }
            .app-container { min-height: auto; height: 92vh; max-height: 900px; border-radius: 28px; margin-top:10px; }
        }
        @media (max-width: 500px) {
            .app-container { max-width:100%; border-radius:0; box-shadow:none; }
        }

        /* 登录界面 */
        .auth-container {
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 30px;
            background: var(--card-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
            width: 100%; max-width: 400px; margin: 60px auto;
        }
        .auth-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
        .auth-tabs { display: flex; margin-bottom: 20px; width: 100%; }
        .auth-tab { flex:1; text-align: center; padding: 10px; cursor: pointer; font-weight: 600; color: var(--text-light); border-bottom: 2px solid transparent; transition: color var(--transition), border-color var(--transition); }
        .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .auth-form { width: 100%; display: none; }
        .auth-form.active { display: block; }
        .auth-input { width: 100%; padding: 13px 15px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; margin-bottom: 12px; background: #FAFBFC; transition: border-color var(--transition); }
        .auth-input:focus { outline: none; border-color: var(--primary); }
        .auth-btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius); background: var(--primary); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: background var(--transition); }
        .auth-btn:hover { background: var(--primary-dark); }
        .auth-error { color: var(--danger); font-size: 13px; margin-bottom: 8px; text-align: center; }
        .logout-btn { position: absolute; top: 10px; right: 15px; background: var(--danger); color: #fff; border: none; padding: 6px 14px; border-radius: 20px; font-weight: 600; cursor: pointer; z-index: 110; font-size:13px; transition: opacity var(--transition); }
        .logout-btn:hover { opacity: 0.9; }

        /* 头部 */
        .header {
            background: var(--card-bg); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top:0; z-index:100; border-bottom:1px solid var(--border-light);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(255,255,255,0.92);
        }
        .header-title { font-size:18px; font-weight:700; color:var(--text); letter-spacing: -0.3px; }
        .header-actions { display:flex; align-items:center; gap:8px; }
        .header-badge {
            font-size:12px; font-weight:600; color:var(--primary); background:var(--primary-light);
            padding:5px 12px; border-radius:20px; letter-spacing:0.2px;
        }
        .btn-icon {
            background:none; border:none; font-size:20px; cursor:pointer; padding:6px 8px; border-radius:8px;
            color: var(--text-secondary); transition: all var(--transition); line-height:1;
        }
        .btn-icon:hover { background: #F0F2F5; color: var(--primary); }
        .btn-icon.recycle-bin { position: relative; }
        .recycle-count {
            position: absolute; top: -4px; right: -6px; background: var(--danger); color: #fff; font-size:10px;
            width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; display: none;
        }
        .recycle-count.show { display: flex; }

        .main-content {
            flex:1; overflow-y:auto; padding:16px 16px 100px; display:flex; flex-direction:column; gap:14px;
            -webkit-overflow-scrolling: touch;
        }
        .main-content::-webkit-scrollbar { width:0; }

        .search-section { position:relative; z-index:50; }
        .search-wrapper { display:flex; gap:10px; align-items:center; }
        .search-input-wrap {
            flex:1; position:relative; background:var(--card-bg); border-radius:var(--radius-lg);
            box-shadow:var(--shadow-sm); border:2px solid transparent; transition:all var(--transition);
            display:flex; align-items:center; overflow:hidden;
        }
        .search-input-wrap:focus-within { border-color:var(--primary); box-shadow:var(--shadow), 0 0 0 4px rgba(79,110,247,0.08); }
        .search-icon { position:absolute; left:16px; pointer-events:none; }
        .search-input {
            width:100%; border:none; outline:none; font-size:16px; padding:15px 16px 15px 48px;
            background:transparent; color:var(--text); font-family:inherit; border-radius:var(--radius-lg);
        }
        .search-input::placeholder { color: #B0B8C1; }
        .search-clear {
            position:absolute; right:10px; z-index:2; width:30px; height:30px; border-radius:50%;
            border:none; background:#E8ECF1; color:#8E95A0; cursor:pointer; display:flex;
            align-items:center; justify-content:center; font-size:16px; transition:all var(--transition);
            opacity:0; pointer-events:none; transform:scale(0.7);
        }
        .search-clear.visible { opacity:1; pointer-events:auto; transform:scale(1); }
        .btn-add {
            flex-shrink:0; width:50px; height:50px; border-radius:50%; background:var(--primary); color:#fff;
            border:none; font-size:26px; cursor:pointer; display:flex; align-items:center; justify-content:center;
            box-shadow: 0 4px 14px rgba(79,110,247,0.4); transition:all var(--transition);
        }
        .btn-add:active { transform:scale(0.9); }

        .dropdown-suggestions {
            position:absolute; top:calc(100% + 6px); left:0; right:62px; background:var(--card-bg);
            border-radius:var(--radius); box-shadow:var(--shadow-lg); max-height:0; overflow:hidden;
            transition:max-height 0.3s ease; z-index:60; border:1px solid transparent;
        }
        .dropdown-suggestions.active { max-height:380px; border-color:var(--border-light); }
        .dropdown-inner { max-height:370px; overflow-y:auto; padding:6px; }
        .suggestion-item {
            display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:var(--radius-sm);
            cursor:pointer; transition:all 0.15s ease;
        }
        .suggestion-item:hover { background:#F5F7FF; }
        .suggestion-avatar {
            width:42px; height:42px; border-radius:50%; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            font-weight:700; font-size:16px; color:#fff;
        }
        .suggestion-name { font-weight:600; font-size:15px; }
        .suggestion-phone { font-size:13px; color:var(--text-secondary); }
        .suggestion-card-badge {
            font-size:11px; font-weight:600; color:#fff; background:var(--primary); padding:4px 10px; border-radius:12px; white-space:nowrap;
        }
        .suggestion-card-badge.low { background: var(--warning); }
        .suggestion-card-badge.empty { background: var(--danger); }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 4px; }
        .stat-card { background: var(--card-bg); border-radius: var(--radius-sm); padding: 12px 8px; text-align: center; box-shadow: var(--shadow-sm); }
        .stat-label { font-size: 11px; color: var(--text-light); font-weight: 500; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--text); }
        .stat-value.today { color: var(--warning); }
        .stat-value.month { color: var(--primary); }
        .stat-value.remaining { color: var(--success); }

        .customer-detail-card {
            background:var(--card-bg); border-radius:var(--radius-lg); box-shadow:var(--shadow);
            animation: slideUp 0.35s ease; display:none;
        }
        .customer-detail-card.visible { display:block; }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .detail-header { padding:20px; display:flex; align-items:center; gap:14px; border-bottom:1px solid var(--border-light); }
        .detail-avatar {
            width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-weight:700; font-size:20px; color:#fff;
        }
        .detail-header-info { flex:1; }
        .detail-name { font-size:20px; font-weight:700; }
        .detail-phone { font-size:14px; color:var(--text-secondary); margin-top:2px; }
        .detail-actions { display:flex; gap:8px; margin-left:auto; }
        .btn-icon-sm {
            width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:#fff;
            cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center;
            transition:all var(--transition); color:var(--text-secondary);
        }
        .btn-icon-sm:hover { background:#F9FAFB; border-color:#D1D5DB; }
        .btn-use {
            flex:1; padding:14px; border-radius:var(--radius); font-size:16px; font-weight:700; border:none;
            cursor:pointer; transition:all var(--transition); font-family:inherit;
        }
        .btn-use.primary-action { background:var(--primary); color:#fff; }
        .btn-use.primary-action:disabled { background:#C7CDD8; cursor:not-allowed; }
        .btn-use.secondary-action { background:#fff; color:var(--text); border:2px solid var(--border); flex:0.7; }

        .purchase-history { margin-top:12px; }
        .purchase-item { display:flex; justify-content:space-between; padding:8px 12px; background:#FAFBFC; border-radius:8px; margin-bottom:6px; font-size:13px; }
        .progress-bar-bg { height:8px; background:#E8ECF1; border-radius:10px; overflow:hidden; margin-top:4px; }
        .progress-bar-fill { height:100%; border-radius:10px; }
        .progress-bar-fill.good { background:var(--success); }
        .progress-bar-fill.warning { background:var(--warning); }
        .progress-bar-fill.danger { background:var(--danger); }

        .list-view { display:none; flex-direction:column; }
        .list-header { display:flex; align-items:center; gap:12px; padding:12px 0 16px; }
        .back-btn {
            background:none; border:none; font-size:16px; font-weight:600; color:var(--primary); cursor:pointer;
            padding:6px 12px; border-radius:8px; transition: background var(--transition);
        }
        .back-btn:hover { background:var(--primary-light); }
        .list-title { font-size:18px; font-weight:700; }
        .list-actions { margin-left:auto; display:flex; gap:8px; }
        .btn-export {
            background:var(--success); color:#fff; border:none; padding:8px 16px; border-radius:20px;
            font-weight:600; font-size:13px; cursor:pointer; transition:all var(--transition);
        }
        .btn-export.import-btn { background: var(--primary); }
        .btn-export:hover { opacity:0.9; }
        .list-body { display:flex; flex-direction:column; gap:10px; }
        .customer-list-item {
            background:var(--card-bg); border-radius:var(--radius); padding:16px; display:flex; align-items:center;
            gap:12px; box-shadow:var(--shadow-sm); cursor:pointer; transition:all var(--transition);
        }
        .customer-list-item:hover { background:#F9FAFB; box-shadow:var(--shadow); }
        .list-avatar {
            width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-weight:700; color:#fff; font-size:16px;
        }
        .list-info { flex:1; }
        .list-name { font-weight:600; font-size:15px; }
        .list-phone { font-size:13px; color:var(--text-secondary); }
        .list-card-badge { font-size:13px; font-weight:600; padding:4px 12px; border-radius:12px; background:#EEF1FE; color:var(--primary); }
        .list-item-actions { display:flex; gap:6px; }
        .btn-restore, .btn-perm-delete { border:none; background:none; font-size:18px; cursor:pointer; padding:4px; border-radius:6px; transition: background var(--transition); }
        .btn-restore { color: var(--success); }
        .btn-perm-delete { color: var(--danger); }

        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; display:flex; align-items:flex-end;
            justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s ease; backdrop-filter:blur(2px);
        }
        .modal-overlay.active { opacity:1; pointer-events:auto; }
        .modal-sheet {
            background:#fff; width:100%; max-width:500px; border-radius:24px 24px 0 0; max-height:88vh;
            display:flex; flex-direction:column; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
        }
        .modal-overlay.active .modal-sheet { transform:translateY(0); }
        .modal-handle { width:40px; height:5px; background:#D1D5DB; border-radius:3px; margin:12px auto 0; flex-shrink:0; }
        .modal-header { padding:16px 20px 8px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border-light); }
        .modal-title { font-size:18px; font-weight:700; }
        .btn-close-modal { width:32px; height:32px; border-radius:50%; border:none; background:#F3F4F6; cursor:pointer; font-size:18px; transition: background var(--transition); }
        .btn-close-modal:hover { background:#E5E7EB; }
        .modal-body { padding:20px; overflow-y:auto; flex:1; }
        .form-group { margin-bottom:16px; }
        .form-label { font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; display:block; }
        .form-input {
            width:100%; padding:13px 15px; border:2px solid var(--border); border-radius:var(--radius-sm);
            font-size:15px; font-family:inherit; background:#FAFBFC; transition: border-color var(--transition);
        }
        .form-input:focus { outline:none; border-color:var(--primary); background:#fff; }
        .form-input.error { border-color:var(--danger); }
        .form-error-msg { font-size:12px; color:var(--danger); margin-top:4px; display:none; }
        .form-error-msg.visible { display:block; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .modal-footer { padding:12px 20px 28px; display:flex; gap:10px; border-top:1px solid var(--border-light); }
        .btn-submit {
            flex:1; padding:15px; border-radius:var(--radius); font-size:16px; font-weight:700; border:none;
            background:var(--primary); color:#fff; cursor:pointer; transition: background var(--transition);
        }
        .btn-submit:hover { background:var(--primary-dark); }
        .btn-cancel {
            padding:15px 24px; border-radius:var(--radius); font-size:15px; font-weight:600;
            border:2px solid var(--border); background:#fff; color:var(--text-secondary); cursor:pointer; transition: all var(--transition);
        }
        .btn-cancel:hover { background:#F9FAFB; border-color:#CDD2DB; }

        .toast {
            position:fixed; top:30px; left:50%; transform:translateX(-50%) translateY(-120px);
            background:#1C1C1E; color:#fff; padding:12px 22px; border-radius:25px; font-size:14px;
            font-weight:600; z-index:300; transition:transform 0.4s cubic-bezier(0.22,0.61,0.36,1); white-space:nowrap; pointer-events:none;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast.success { background:#34C759; }
        .confirm-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:250; display:flex; align-items:center;
            justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.25s ease; padding:20px;
        }
        .confirm-overlay.active { opacity:1; pointer-events:auto; }
        .confirm-dialog {
            background:#fff; border-radius:var(--radius-lg); padding:24px 20px 20px; text-align:center;
            max-width:320px; width:100%; box-shadow:var(--shadow-lg); transform:scale(0.9); transition:transform 0.3s cubic-bezier(0.22,0.61,0.36,1);
        }
        .confirm-overlay.active .confirm-dialog { transform:scale(1); }
        .confirm-title { font-size:17px; font-weight:700; color:var(--text); margin-bottom:6px; }
        .confirm-message { font-size:14px; color:var(--text-secondary); margin-bottom:18px; line-height:1.5; }
        .confirm-buttons { display:flex; gap:10px; }
        .confirm-buttons button {
            flex:1; padding:12px; border-radius:var(--radius-sm); font-size:15px; font-weight:600; border:none;
            cursor:pointer; transition: all var(--transition); font-family:inherit;
        }
        .confirm-btn-cancel { background:#F3F4F6; color:var(--text-secondary); }
        .confirm-btn-cancel:hover { background:#E5E7EB; }
        .confirm-btn-danger { background:var(--danger); color:#fff; }
        .confirm-btn-danger:hover { background:#E0352B; }
        .confirm-btn-primary { background:var(--primary); color:#fff; }
        .confirm-btn-primary:hover { background:var(--primary-dark); }
        .empty-state { text-align:center; padding:40px 20px; color:var(--text-light); }
        .empty-state-icon { font-size:60px; display:block; margin-bottom:12px; }

        .avatar-green { background:linear-gradient(135deg,#34C759,#30B350); }
        .avatar-blue { background:linear-gradient(135deg,#4F6EF7,#5B7BF9); }
        .avatar-orange { background:linear-gradient(135deg,#FF9500,#FFAA33); }
        .avatar-purple { background:linear-gradient(135deg,#AF52DE,#C06DE8); }
        .avatar-teal { background:linear-gradient(135deg,#5AC8FA,#64D2FB); }
        .avatar-pink { background:linear-gradient(135deg,#FF6482,#FF7A95); }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- 登录/注册界面 -->
    <div class="auth-container" id="authContainer">
        <div class="auth-title">🎫 次卡管理系统</div>
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">登录</div>
            <div class="auth-tab" data-tab="register">注册</div>
        </div>
        <div class="auth-error" id="authError"></div>
        <form class="auth-form active" id="loginForm">
            <input type="email" class="auth-input" id="loginEmail" placeholder="邮箱" required>
            <input type="password" class="auth-input" id="loginPassword" placeholder="密码 (至少6位)" required>
            <button type="submit" class="auth-btn">登 录</button>
        </form>
        <form class="auth-form" id="registerForm">
            <input type="email" class="auth-input" id="registerEmail" placeholder="邮箱" required>
            <input type="password" class="auth-input" id="registerPassword" placeholder="密码 (至少6位)" required>
            <button type="submit" class="auth-btn">注 册</button>
        </form>
    </div>

    <!-- 主系统界面 -->
    <div id="mainSystem" style="display:none; flex-direction: column; flex:1;">
        <button class="logout-btn" id="logoutBtn">退出</button>
        <div class="header">
            <span class="header-title">🎫 次卡管理</span>
            <div class="header-actions">
                <span class="header-badge" id="totalCount">共 0 位客户</span>
                <button class="btn-icon recycle-bin" id="btnRecycleBin" title="回收站">🗑️<span class="recycle-count" id="recycleCount">0</span></button>
                <button class="btn-icon" id="btnAllCustomers" title="全部客户">📋</button>
            </div>
        </div>

        <div class="main-content" id="mainContent">
            <div id="mainView">
                <div class="search-section" id="searchSection">
                    <div class="search-wrapper">
                        <div class="search-input-wrap" id="searchInputWrap">
                            <span class="search-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B0B8C1" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
                            <input type="text" class="search-input" id="searchInput" placeholder="姓名或电话搜索..." autocomplete="off">
                            <button class="search-clear" id="searchClear">✕</button>
                        </div>
                        <button class="btn-add" id="btnAdd">+</button>
                    </div>
                    <div class="dropdown-suggestions" id="dropdownSuggestions"><div class="dropdown-inner" id="dropdownInner"></div></div>
                </div>

                <div class="stats-row" id="statsRow">
                    <div class="stat-card">
                        <div class="stat-label">💰 今日已用</div>
                        <div class="stat-value today" id="todayAmount">¥0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">💵 本月已用</div>
                        <div class="stat-value month" id="monthAmount">¥0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">📈 剩余价值</div>
                        <div class="stat-value remaining" id="remainingAmount">¥0</div>
                    </div>
                </div>

                <div class="customer-detail-card" id="customerDetailCard"></div>
                <div class="empty-state" id="emptyState">
                    <span class="empty-state-icon">📋</span>
                    <p>搜索或点击 + 登记</p>
                </div>
            </div>

            <div class="list-view" id="customerListContainer">
                <div class="list-header">
                    <button class="back-btn" id="backFromListBtn">← 返回</button>
                    <span class="list-title">全部客户</span>
                    <div class="list-actions">
                        <button class="btn-export import-btn" id="btnImport">📥 导入</button>

<script>
    (function() {
        // ========== 替换你自己的配置 ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCZ6jl9f5l4zwdqt1ZuSvZxG8ipnAZVlc0",
            authDomain: "my-card-system-38b24.firebaseapp.com",
            databaseURL: "https://my-card-system-38b24-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-card-system-38b24",
            storageBucket: "my-card-system-38b24.firebasestorage.app",
            messagingSenderId: "856688297230",
            appId: "1:856688297230:web:fb5410c7279e5c5db6035f",
            measurementId: "G-8W52CB6BH6"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // 登录管理
        const authContainer = document.getElementById('authContainer');
        const mainSystem = document.getElementById('mainSystem');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const authError = document.getElementById('authError');
        const tabs = document.querySelectorAll('.auth-tab');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('loginForm').classList.toggle('active', tab.dataset.tab==='login');
                document.getElementById('registerForm').classList.toggle('active', tab.dataset.tab==='register');
                authError.textContent = '';
            });
        });

        loginForm.addEventListener('submit', e => {
            e.preventDefault();
            auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)
                .catch(err => authError.textContent = '登录失败：' + err.message);
        });
        registerForm.addEventListener('submit', e => {
            e.preventDefault();
            auth.createUserWithEmailAndPassword(document.getElementById('registerEmail').value, document.getElementById('registerPassword').value)
                .catch(err => authError.textContent = '注册失败：' + err.message);
        });
        logoutBtn.addEventListener('click', () => auth.signOut());

        let appInitialized = false;
        auth.onAuthStateChanged(user => {
            if (user) {
                authContainer.style.display = 'none';
                mainSystem.style.display = 'flex';
                if (!appInitialized) { appInitialized = true; initApp(); }
            } else {
                authContainer.style.display = 'flex';
                mainSystem.style.display = 'none';
            }
        });

        function initApp() {
            // ---------- 以下为完整业务逻辑（与上一版一致） ----------
            const AVATAR_CLASSES = ['avatar-green','avatar-blue','avatar-orange','avatar-purple','avatar-teal','avatar-pink'];
            const $ = id => document.getElementById(id);
            const searchInput = $('searchInput');
            const searchClear = $('searchClear');
            const dropdownSuggestions = $('dropdownSuggestions');
            const dropdownInner = $('dropdownInner');
            const customerDetailCard = $('customerDetailCard');
            const emptyState = $('emptyState');
            const totalCountEl = $('totalCount');
            const btnAdd = $('btnAdd');
            const modalOverlay = $('modalOverlay');
            const modalTitle = $('modalTitle');
            const formCustomerId = $('formCustomerId');
            const formName = $('formName');
            const formPhone = $('formPhone');
            const formCardType = $('formCardType');
            const formTotalSessions = $('formTotalSessions');
            const formRemainingSessions = $('formRemainingSessions');
            const formNotes = $('formNotes');
            const btnSubmit = $('btnSubmit');
            const mainView = $('mainView');
            const customerListContainer = $('customerListContainer');
            const customerListBody = $('customerListBody');
            const recycleBinContainer = $('recycleBinContainer');
            const recycleListBody = $('recycleListBody');
            const recycleCount = $('recycleCount');
            const repurchaseModal = $('repurchaseModal');
            const repurchaseType = $('repurchaseType');
            const repurchaseSessions = $('repurchaseSessions');
            const repurchaseDate = $('repurchaseDate');
            const confirmUseOverlay = $('confirmUseOverlay');
            const confirmUseMessage = $('confirmUseMessage');
            const confirmAddOverlay = $('confirmAddOverlay');
            const confirmAddMessage = $('confirmAddMessage');
            const confirmDeleteOverlay = $('confirmDeleteOverlay');
            const confirmDeleteMessage = $('confirmDeleteMessage');
            const toast = $('toast');
            const importFileInput = $('importFileInput');
            const todayAmountEl = $('todayAmount');
            const monthAmountEl = $('monthAmount');
            const remainingAmountEl = $('remainingAmount');

            let customers = [];
            let deletedCustomers = [];
            let selectedCustomerId = null;
            let pendingUseId = null;
            let pendingDeleteId = null;
            let pendingRepurchaseId = null;
            let pendingAddId = null;
            let toastTimer = null;
            let isEditing = false;

            function getAvatarClass(id) { let hash=0; for(let i=0;i<String(id).length;i++) hash = String(id).charCodeAt(i)+((hash<<5)-hash); return AVATAR_CLASSES[Math.abs(hash)%AVATAR_CLASSES.length]; }
            function getInitial(name) { return name?.trim()?.charAt(0)?.toUpperCase()||'?'; }
            function escapeHtml(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }
            function showToast(msg, type='') { if(toastTimer)clearTimeout(toastTimer); toast.textContent=msg; toast.className='toast '+type+' show'; toastTimer=setTimeout(()=>toast.classList.remove('show'),2000); }
            function getTotalSessions(c) { return c.purchases?.reduce((s,p)=>s+(p.sessions||0),0)||0; }
            function getRemaining(c) { return Math.max(0, getTotalSessions(c)-(c.usedSessions||0)); }
            function formatPhone(p) { return p?.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3')||p; }
            function getPricePerUse(customer) { if(!customer.purchases?.length) return 0; const last=customer.purchases[customer.purchases.length-1]; if(last.type.includes('10')) return 60; if(last.type.includes('5')) return 70; return 0; }

            function updateStats() {
                const now = new Date();
                const todayStr = now.toISOString().slice(0,10);
                const currentMonth = now.getMonth(), currentYear = now.getFullYear();
                let todayTotal=0, monthTotal=0, remainingTotal=0;
                customers.forEach(c => {
                    const price = getPricePerUse(c);
                    if(price>0) remainingTotal += getRemaining(c)*price;
                    if(c.usageHistory) {
                        c.usageHistory.forEach(use => {
                            const d = new Date(use.datetime);
                            if(d.toISOString().slice(0,10)===todayStr) todayTotal+=price;
                            if(d.getMonth()===currentMonth && d.getFullYear()===currentYear) monthTotal+=price;
                        });
                    }
                });
                todayAmountEl.textContent = '¥'+todayTotal;
                monthAmountEl.textContent = '¥'+monthTotal;
                remainingAmountEl.textContent = '¥'+remainingTotal;
            }

            function saveAll() { database.ref('customers').set(customers); database.ref('deletedCustomers').set(deletedCustomers); }
            function loadData() {
                database.ref('customers').on('value', snap => {
                    customers = snap.val()||[];
                    if(!Array.isArray(customers)) customers=[];
                    updateUI();
                    if(selectedCustomerId) { const c=customers.find(c=>c.id===selectedCustomerId); if(c) renderDetail(c); else clearSelection(); }
                    if(customerListContainer.style.display==='flex') renderAllCustomers();
                    if(recycleBinContainer.style.display==='flex') renderRecycleBin();
                });
                database.ref('deletedCustomers').on('value', snap => {
                    deletedCustomers = snap.val()||[];
                    if(!Array.isArray(deletedCustomers)) deletedCustomers=[];
                    updateUI();
                });
            }
            function updateUI() { totalCountEl.textContent='共 '+customers.length+' 位客户'; recycleCount.textContent=deletedCustomers.length; recycleCount.classList.toggle('show', deletedCustomers.length>0); updateStats(); }

            function searchCustomers(q) { const s=q.trim().toLowerCase(); if(!s) return []; return customers.filter(c=>c.name.toLowerCase().includes(s)||c.phone.includes(s)); }
            function renderDropdown(results) {
                dropdownInner.innerHTML='';
                if(!results.length) { dropdownInner.innerHTML='<div class="empty-state"><p>未找到客户</p></div>'; return; }
                results.forEach(c => {
                    const rem=getRemaining(c), total=getTotalSessions(c), badge=rem<=0?'empty':(total&&rem/total<0.25?'low':'');
                    const item=document.createElement('div'); item.className='suggestion-item';
                    item.innerHTML=`<div class="suggestion-avatar ${getAvatarClass(c.id)}">${getInitial(c.name)}</div><div class="suggestion-info"><div class="suggestion-name">${escapeHtml(c.name)}</div><div class="suggestion-phone">${formatPhone(c.phone)}</div></div><span class="suggestion-card-badge ${badge}">${c.purchases?.[c.purchases.length-1]?.type||'次卡'} · 剩${rem}次</span>`;
                    item.addEventListener('click', ()=>{ selectCustomer(c.id); closeDropdown(); searchInput.value=c.name; });
                    dropdownInner.appendChild(item);
                });
            }
            function openDropdown() { dropdownSuggestions.classList.add('active'); }
            function closeDropdown() { dropdownSuggestions.classList.remove('active'); }

            function selectCustomer(id) { selectedCustomerId=id; const c=customers.find(c=>c.id===id); if(!c)return; renderDetail(c); customerDetailCard.classList.add('visible'); emptyState.style.display='none'; hideAllViews(); mainView.style.display='block'; }
            function clearSelection() { selectedCustomerId=null; customerDetailCard.classList.remove('visible'); emptyState.style.display='block'; searchInput.value=''; closeDropdown(); if(mainView.style.display==='none') showMainView(); }
            function renderDetail(c) {
                const total=getTotalSessions(c), rem=getRemaining(c), progress=total?Math.round(rem/total*100):0;
                const progressClass = rem<=0?'danger':(rem/total<0.25?'warning':'good');
                const canUse = rem>0 && total>0;
                let purchaseHtml=c.purchases?.map(p=>`<div class="purchase-item"><span>${p.type} (${p.sessions}次) ${p.date||''}</span></div>`).join('')||'';
                let usageHtml='';
                if(c.usageHistory?.length) {
                    const sorted=[...c.usageHistory].sort((a,b)=>new Date(b.datetime)-new Date(a.datetime));
                    usageHtml=`<div style="margin-top:16px;border-top:1px solid #eee;padding-top:12px;"><div style="font-weight:600;margin-bottom:8px;">📋 使用记录</div>${sorted.slice(0,8).map(u=>`<div class="purchase-item"><span>${new Date(u.datetime).toLocaleString()}</span><span>剩余 ${u.remainingAfter} 次</span></div>`).join('')}</div>`;
                }
                customerDetailCard.innerHTML=`
                    <div class="detail-header"><div class="detail-avatar ${getAvatarClass(c.id)}">${getInitial(c.name)}</div><div class="detail-header-info"><div class="detail-name">${escapeHtml(c.name)}</div><div class="detail-phone">${formatPhone(c.phone)}</div></div><div class="detail-actions"><button class="btn-icon-sm" id="btnEditDetail">✎</button><button class="btn-icon-sm" id="btnRepurchase">💳</button><button class="btn-icon-sm" id="btnDeleteDetail">🗑</button></div></div>
                    <div style="padding:16px 20px;">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
                            <div style="background:#F9FAFB;border-radius:10px;padding:12px;"><div style="font-size:11px;color:#9CA3AF;">总次数</div><div style="font-size:20px;font-weight:700;">${total}</div></div>
                            <div style="background:#F9FAFB;border-radius:10px;padding:12px;"><div style="font-size:11px;color:#9CA3AF;">剩余</div><div style="font-size:20px;font-weight:700;color:${rem<=0?'#FF3B30':rem<total*0.25?'#FF9500':'#4F6EF7'}">${rem}</div><div class="progress-bar-bg"><div class="progress-bar-fill ${progressClass}" style="width:${progress}%"></div></div></div>
                        </div>
                        ${c.notes?`<div style="background:#F9FAFB;border-radius:10px;padding:12px;margin-bottom:12px;"><span style="font-size:11px;color:#9CA3AF;">备注</span><div>${escapeHtml(c.notes)}</div></div>`:''}
                        <div class="purchase-history"><div style="font-weight:600;margin-bottom:8px;">💳 购买记录</div>${purchaseHtml||'<div style="color:#BCC3CD;">暂无购买记录</div>'}</div>
                        ${usageHtml}
                    </div>
                    <div style="padding:0 20px 20px;display:flex;gap:10px;flex-wrap:wrap;">
                        <button class="btn-use primary-action" id="btnUseSession" ${!canUse?'disabled':''}>${canUse?'✅ 使用 1 次':'🚫 次数已用完'}</button>
                        <button class="btn-use secondary-action" id="btnAddOneSession" style="background:#34C759;color:#fff;border:none;">➕ 增加 1 次</button>
                        <button class="btn-use secondary-action" id="btnClearDetail">关闭</button>
                        <button class="btn-use secondary-action" id="btnGoHome" style="background:#fff;color:var(--text);border:2px solid var(--border);">🏠 返回首页</button>
                    </div>`;
                $('btnEditDetail').addEventListener('click', ()=>openEditModal(c));
                $('btnRepurchase').addEventListener('click', ()=>openRepurchaseModal(c.id));
                $('btnDeleteDetail').addEventListener('click', ()=>{ pendingDeleteId=c.id; confirmDeleteMessage.textContent=`将「${c.name}」移入回收站，可恢复。`; confirmDeleteOverlay.classList.add('active'); });
                $('btnUseSession')?.addEventListener('click', ()=>{ if(!canUse)return; pendingUseId=c.id; confirmUseMessage.textContent=`确认为「${c.name}」使用1次？剩余将变为 ${rem-1} 次`; confirmUseOverlay.classList.add('active'); });
                $('btnAddOneSession').addEventListener('click', ()=>{
                    if(c.usedSessions>0) {
                        pendingAddId = c.id;
                        confirmAddMessage.textContent = `确认为「${c.name}」增加1次吗？将撤销最近一次使用记录，并减少今日/本月已用金额。`;
                        confirmAddOverlay.classList.add('active');
                    } else showToast('当前已无已用次数，无需增加');
                });
                $('btnClearDetail').addEventListener('click', clearSelection);
                $('btnGoHome').addEventListener('click', ()=>{ clearSelection(); showMainView(); });
            }

            function openEditModal(customer) { isEditing=true; modalTitle.textContent='编辑客户信息'; formCustomerId.value=customer.id; formName.value=customer.name; formPhone.value=customer.phone; formCardType.value=customer.purchases?.[customer.purchases.length-1]?.type?.includes('5')?'5次卡':'10次卡'; formTotalSessions.value=getTotalSessions(customer); formRemainingSessions.value=getRemaining(customer); formNotes.value=customer.notes||''; modalOverlay.classList.add('active'); }
            function openAddModal() { isEditing=false; modalTitle.textContent='登记新用户'; formCustomerId.value=''; formName.value=''; formPhone.value=''; formCardType.value='10次卡'; formTotalSessions.value='10'; formRemainingSessions.value='10'; formNotes.value=''; modalOverlay.classList.add('active'); }
            function closeModal() { modalOverlay.classList.remove('active'); }
            function submitCustomerForm() {
                const name=formName.value.trim(), phone=formPhone.value.trim().replace(/[^0-9]/g,''), cardType=formCardType.value, total=parseInt(formTotalSessions.value), remaining=parseInt(formRemainingSessions.value);
                if(!name||!phone||phone.length<10||isNaN(total)||total<1||isNaN(remaining)||remaining<0||remaining>total) { showToast('请完整且正确填写信息','error'); return; }
                if(isEditing && formCustomerId.value) {
                    const c=customers.find(c=>c.id===formCustomerId.value);
                    if(c) { c.name=name; c.phone=phone; c.purchases=[{type:cardType, sessions:total, date:new Date().toISOString().slice(0,10)}]; c.usedSessions=total-remaining; c.notes=formNotes.value.trim(); saveAll(); closeModal(); if(selectedCustomerId===c.id) renderDetail(c); showToast('✅ 信息已更新','success'); }
                } else {
                    const newCust={ id:Date.now().toString(36)+Math.random().toString(36).substring(2,6), name, phone, purchases:[{type:cardType, sessions:total, date:new Date().toISOString().slice(0,10)}], usedSessions:total-remaining, notes:formNotes.value.trim(), usageHistory:[] };
                    customers.push(newCust); saveAll(); closeModal(); selectCustomer(newCust.id); searchInput.value=newCust.name; showToast('🎉 登记成功','success');
                }
            }

            function openRepurchaseModal(customerId) { pendingRepurchaseId=customerId; repurchaseType.value='10次卡'; repurchaseSessions.value='10'; repurchaseDate.value=new Date().toISOString().slice(0,10); repurchaseModal.classList.add('active'); }
            function closeRepurchaseModal() { repurchaseModal.classList.remove('active'); }
            function submitRepurchase() { const c=customers.find(c=>c.id===pendingRepurchaseId); if(!c)return; const type=repurchaseType.value, sessions=parseInt(repurchaseSessions.value); if(isNaN(sessions)||sessions<1){showToast('请输入有效次数','error');return;} c.purchases.push({type,sessions,date:repurchaseDate.value}); saveAll(); closeRepurchaseModal(); if(selectedCustomerId===c.id) renderDetail(c); showToast(`✅ 已添加 ${type} (${sessions}次)`,'success'); }

            function executeUse() {
                if(!pendingUseId) return; const c=customers.find(c=>c.id===pendingUseId); if(!c||getRemaining(c)<=0) return;
                c.usedSessions = (c.usedSessions||0)+1;
                if(!c.usageHistory) c.usageHistory=[];
                c.usageHistory.push({datetime:new Date().toISOString(), remainingAfter:getRemaining(c)});
                saveAll(); confirmUseOverlay.classList.remove('active'); if(selectedCustomerId===c.id) renderDetail(c); showToast('✅ 使用成功','success'); pendingUseId=null;
            }

            function executeAddOne() {
                if(!pendingAddId) return; const c=customers.find(c=>c.id===pendingAddId);
                if(!c || c.usedSessions<=0) return;
                c.usedSessions -= 1;
                if(c.usageHistory && c.usageHistory.length>0) {
                    c.usageHistory.sort((a,b)=>new Date(b.datetime)-new Date(a.datetime));
                    c.usageHistory.shift(); // 移除最新一条（即最近一次使用）
                }
                saveAll(); confirmAddOverlay.classList.remove('active'); if(selectedCustomerId===c.id) renderDetail(c); showToast('✅ 已增加一次，统计已更新','success'); pendingAddId=null;
            }

            function moveToTrash(id) { const idx=customers.findIndex(c=>c.id===id); if(idx===-1)return; const [deleted]=customers.splice(idx,1); deletedCustomers.push({customer:deleted, deletedAt:Date.now()}); saveAll(); confirmDeleteOverlay.classList.remove('active'); if(selectedCustomerId===id) clearSelection(); showToast('已移入回收站'); }
            function restoreCustomer(index) { const entry=deletedCustomers[index]; if(!entry)return; customers.push(entry.customer); deletedCustomers.splice(index,1); saveAll(); showToast('已恢复客户'); }
            function permanentlyDelete(index) { deletedCustomers.splice(index,1); saveAll(); showToast('已彻底删除'); }
            function renderRecycleBin() {
                recycleListBody.innerHTML=''; if(!deletedCustomers.length){recycleListBody.innerHTML='<div class="empty-state"><span class="empty-state-icon">📭</span><p>回收站为空</p></div>';return;}
                deletedCustomers.forEach((entry,idx)=>{
                    const c=entry.customer;
                    const div=document.createElement('div'); div.className='customer-list-item';
                    div.innerHTML=`<div class="list-avatar ${getAvatarClass(c.id)}">${getInitial(c.name)}</div><div class="list-info"><div class="list-name">${escapeHtml(c.name)}</div><div class="list-phone">${formatPhone(c.phone)}</div><div style="font-size:11px;color:#9CA3AF;">删除于 ${new Date(entry.deletedAt).toLocaleDateString()}</div></div><div class="list-item-actions"><button class="btn-restore" data-index="${idx}">↩️</button><button class="btn-perm-delete" data-index="${idx}">❌</button></div>`;
                    div.querySelector('.btn-restore').addEventListener('click',(e)=>{e.stopPropagation(); restoreCustomer(idx); renderRecycleBin();});
                    div.querySelector('.btn-perm-delete').addEventListener('click',(e)=>{e.stopPropagation(); if(confirm('确定彻底删除？')){permanentlyDelete(idx); renderRecycleBin();}});
                    recycleListBody.appendChild(div);
                });
            }
            function renderAllCustomers() {
                customerListBody.innerHTML=''; if(!customers.length){customerListBody.innerHTML='<div class="empty-state"><span class="empty-state-icon">📭</span><p>暂无客户</p></div>';return;}
                customers.forEach(c=>{
                    const rem=getRemaining(c); const total=getTotalSessions(c);
                    const div=document.createElement('div'); div.className='customer-list-item';
                    div.innerHTML=`<div class="list-avatar ${getAvatarClass(c.id)}">${getInitial(c.name)}</div><div class="list-info"><div class="list-name">${escapeHtml(c.name)}</div><div class="list-phone">${formatPhone(c.phone)}</div></div><span class="list-card-badge">${c.purchases?.[c.purchases.length-1]?.type||'次卡'} · 剩${rem}次</span>`;
                    div.addEventListener('click',()=>{ selectCustomer(c.id); searchInput.value=c.name; });
                    customerListBody.appendChild(div);
                });
            }
            function exportToExcel() {
                const rows=[['姓名','电话','总次数','已用次数','剩余次数','购买记录','备注']];
                customers.forEach(c=>{ const total=getTotalSessions(c), used=c.usedSessions||0, rem=total-used; const purchaseStr=c.purchases?.map(p=>`${p.type}(${p.sessions}次 ${p.date})`).join('; ')||''; rows.push([c.name,c.phone,total,used,rem,purchaseStr,c.notes||'']); });
                const csvContent=rows.map(r=>r.map(f=>`"${String(f).replace(/"/g,'""')}"`).join(',')).join('\n');
                const blob=new Blob(['\uFEFF'+csvContent],{type:'text/csv;charset=utf-8;'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`客户次卡_${new Date().toISOString().slice(0,10)}.csv`; a.click(); showToast('📥 导出成功','success');
            }
            $('btnImport').addEventListener('click',()=>importFileInput.click());
            importFileInput.addEventListener('change', (e)=>{
                const file=e.target.files[0]; if(!file)return;
                const reader=new FileReader();
                reader.onload=(event)=>{
                    const csvText=event.target.result;
                    const imported=parseCSV(csvText);
                    if(!imported||imported.length===0){showToast('未解析到有效数据','error');return;}
                    let added=0,updated=0;
                    imported.forEach(row=>{
                        const phone=(row['电话']||row['phone']||'').replace(/[^0-9]/g,''); if(!phone)return;
                        const name=row['姓名']||row['name']||'未命名', totalSessions=parseInt(row['总次数']||row['totalsessions']||0)||0, usedSessions=parseInt(row['已用次数']||row['usedsessions']||0)||0, notes=row['备注']||row['notes']||'', cardType=row['卡类型']||row['cardtype']||'';
                        const existing=customers.find(c=>c.phone===phone);
                        if(existing) { existing.name=name; existing.notes=notes; if(totalSessions>0){ const currentTotal=getTotalSessions(existing); const diff=totalSessions-currentTotal; if(diff!==0) existing.purchases.push({type:cardType||(diff>0?'导入调整':'导入调整'), sessions:Math.abs(diff), date:new Date().toISOString().slice(0,10)}); existing.usedSessions=usedSessions; } updated++; }
                        else { customers.push({id:Date.now().toString(36)+Math.random().toString(36).substring(2,6),name,phone,purchases:totalSessions>0?[{type:cardType||'导入', sessions:totalSessions, date:new Date().toISOString().slice(0,10)}]:[], usedSessions:usedSessions, notes, usageHistory:[]}); added++; }
                    });
                    saveAll(); renderAllCustomers(); showToast(`导入完成：新增 ${added}，更新 ${updated}`,'success');
                };
                reader.readAsText(file,'UTF-8'); importFileInput.value='';
            });
            function parseCSV(text){ const lines=text.split(/\r?\n/).filter(l=>l.trim()); if(lines.length<2)return[]; const headers=parseCSVLine(lines[0]); const res=[]; for(let i=1;i<lines.length;i++){ const vals=parseCSVLine(lines[i]); if(vals.length===0)continue; const obj={}; headers.forEach((h,idx)=>obj[h.trim()]=vals[idx]||''); res.push(obj); } return res; }
            function parseCSVLine(line){ const res=[]; let cur='', inQ=false; for(let i=0;i<line.length;i++){ const c=line[i]; if(c==='"'){ if(!inQ) inQ=true; else{ if(line[i+1]==='"'){ cur+='"'; i++; } else inQ=false; } } else if(c===','&&!inQ){ res.push(cur.trim()); cur=''; } else cur+=c; } res.push(cur.trim()); return res; }

            function hideAllViews(){ mainView.style.display='none'; customerListContainer.style.display='none'; recycleBinContainer.style.display='none'; }
            function showMainView(){ hideAllViews(); mainView.style.display='block'; }
            function showCustomerList(){ hideAllViews(); customerListContainer.style.display='flex'; renderAllCustomers(); }
            function showRecycleBin(){ hideAllViews(); recycleBinContainer.style.display='flex'; renderRecycleBin(); }

            searchInput.addEventListener('input', function(){ const q=this.value; searchClear.classList.toggle('visible',!!q.trim()); if(q.trim()){ renderDropdown(searchCustomers(q)); openDropdown(); } else closeDropdown(); });
            searchClear.addEventListener('click', ()=>{ clearSelection(); searchInput.focus(); });
            document.addEventListener('click', (e)=>{ if(!document.getElementById('searchSection')?.contains(e.target)) closeDropdown(); });
            searchInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ const results=searchCustomers(searchInput.value.trim()); if(results.length===1){ selectCustomer(results[0].id); closeDropdown(); } else if(results.length>1) openDropdown(); } });
            btnAdd.addEventListener('click', openAddModal);
            $('btnCloseModal').addEventListener('click', closeModal);
            $('btnCancel').addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e)=>{ if(e.target===modalOverlay) closeModal(); });
            btnSubmit.addEventListener('click', submitCustomerForm);
            $('btnCloseRepurchase').addEventListener('click', closeRepurchaseModal);
            $('btnCancelRepurchase').addEventListener('click', closeRepurchaseModal);
            repurchaseModal.addEventListener('click', (e)=>{ if(e.target===repurchaseModal) closeRepurchaseModal(); });
            $('btnSubmitRepurchase').addEventListener('click', submitRepurchase);
            repurchaseType.addEventListener('change', function(){ repurchaseSessions.value = this.value==='5次卡'?5:10; });

            $('confirmUseCancel').addEventListener('click', ()=>confirmUseOverlay.classList.remove('active'));
            $('confirmUseOk').addEventListener('click', executeUse);
            confirmUseOverlay.addEventListener('click', (e)=>{ if(e.target===confirmUseOverlay) confirmUseOverlay.classList.remove('active'); });

            $('confirmAddCancel').addEventListener('click', ()=>confirmAddOverlay.classList.remove('active'));
            $('confirmAddOk').addEventListener('click', executeAddOne);
            confirmAddOverlay.addEventListener('click', (e)=>{ if(e.target===confirmAddOverlay) confirmAddOverlay.classList.remove('active'); });

            $('confirmDeleteCancel').addEventListener('click', ()=>confirmDeleteOverlay.classList.remove('active'));
            $('confirmDeleteOk').addEventListener('click', ()=>{ if(pendingDeleteId) moveToTrash(pendingDeleteId); });
            confirmDeleteOverlay.addEventListener('click', (e)=>{ if(e.target===confirmDeleteOverlay) confirmDeleteOverlay.classList.remove('active'); });

            $('btnAllCustomers').addEventListener('click', showCustomerList);
            $('backFromListBtn').addEventListener('click', showMainView);
            $('btnRecycleBin').addEventListener('click', showRecycleBin);
            $('backFromRecycleBtn').addEventListener('click', showMainView);
            $('btnExport').addEventListener('click', exportToExcel);

            loadData();
            showMainView();
            emptyState.style.display='block';
            customerDetailCard.classList.remove('visible');
        }
    })();
</script>
</body>
</html>
